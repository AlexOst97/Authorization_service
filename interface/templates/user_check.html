{% extends 'user_base.html' %}
{% block content %}


<form method="post">
    {% csrf_token %}
    <div class="form-group">
        <label for="phone_number">Номер телефона:</label>
        <input type="text" class="form-control" id="phone_number" name="phone_number" required>
    </div>
    
    <div class="form-group">
        <label for="authorization_code">Код подтверждения:</label>
        <input type="text" class="form-control" id="authorization_code" name="authorization_code" required>
    </div>
    <button type="submit" class="btn btn-primary">Войти</button>
    <div class="btn-group">
        <a class="btn btn-sm btn-outline-secondary" href="{% url 'interface:register' %}" role="button">Назад</a>
    </div>
</form>
{% endblock %}
